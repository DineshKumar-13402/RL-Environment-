spec_version: 1
name: restaurant-openenv-final
type: environment
runtime: docker
app: app.py
port: 7860
description: "A restaurant management OpenEnv simulating Andhra/Telangana cuisine."
tags: [openenv, reinforcement-learning, restaurant]

tasks:
  task_1:
    description: "Task 1 (Easy): Staff Scheduling Optimization."
    observation_model: "models:Task1Observation"
    action_model: "models:Task1Action"
    reward_model: "models:Task1Reward"
    grader: "graders:Task1Grader"

  task_2:
    description: "Task 2 (Medium): Menu and Inventory Optimization."
    observation_model: "models:Task2Observation"
    action_model: "models:Task2Action"
    reward_model: "models:Task2Reward"
    grader: "graders:Task2Grader"

  task_3:
    description: "Task 3 (Hard): End-to-End Restaurant Optimization."
    observation_model: "models:Task3Observation"
    action_model: "models:Task3Action"
    reward_model: "models:Task3Reward"
    grader: "graders:Task3Grader"